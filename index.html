<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Webhook 鯖破壊</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-slate-300 min-h-screen flex items-center justify-center p-4">

    <div id="toolScreen" class="w-full max-w-md p-8 bg-gray-900 rounded-3xl shadow-2xl border border-gray-700">
        <h1 class="text-xl font-black text-white mb-8 tracking-tighter uppercase text-center">webhook NUKER</h1>

        <div class="space-y-6">
            <div>
                <label class="text-[10px] text-gray-500 font-bold uppercase ml-1 text-indigo-400">Webhook URL</label>
                <input type="text" id="webhookUrl" placeholder="https://discord.com/api/webhooks/..." 
                    class="w-full bg-gray-800 border border-gray-700 rounded-xl p-4 text-sm text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
            </div>

            <div>
                <label class="text-[10px] text-gray-500 font-bold uppercase ml-1 text-indigo-400">感覚（変えなくてもぜんぜん鯖飛びます）</label>
                <input type="number" id="interval" value="3" min="1"
                    class="w-full bg-gray-800 border border-gray-700 rounded-xl p-4 text-sm text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
            </div>

            <button type="button" onclick="openAuth()" id="preStartBtn"
                class="w-full bg-white hover:bg-gray-200 text-black font-black py-4 rounded-xl shadow-xl transition-all uppercase tracking-widest">
                破壊を開始
            </button>

            <div id="statusArea" class="hidden border-t border-gray-800 pt-6 mt-6 text-center">
                <span class="text-red-500 font-bold animate-pulse text-xs">稼働中</span>
                <p class="text-gray-500 text-[10px] mt-1">破壊数: <span id="counter" class="text-white">0</span></p>
            </div>
        </div>
    </div>

    <div id="authOverlay" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-6">
        <div class="bg-gray-900 p-8 rounded-3xl border border-gray-700 w-full max-w-sm text-center shadow-2xl shadow-indigo-500/10">
            <h2 class="text-white font-bold mb-2 uppercase text-sm tracking-widest">認証</h2>
            <p class="text-gray-500 text-[10px] mb-6">実行にはアクセスキーの入力が必要です discord.gg/ex27h2u8kkに入って受け取ろう</p>
            
            <input type="password" id="accessKey" placeholder="アクセスキーを貼り付けてください" 
                class="w-full bg-black border border-gray-700 rounded-xl p-4 text-white text-center focus:outline-none focus:ring-2 focus:ring-red-600 mb-6 transition-all">
            
            <div class="flex gap-2">
                <button onclick="closeAuth()" class="flex-1 bg-gray-800 text-gray-400 py-3 rounded-xl font-bold hover:bg-gray-700 transition-all">戻る</button>
                <button onclick="checkAndStart()" class="flex-1 bg-red-600 text-white py-3 rounded-xl font-bold hover:bg-red-500 transition-all shadow-lg">実行</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
