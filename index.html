<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord nuker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-black text-slate-300 min-h-screen flex items-center justify-center p-4">

    <div id="toolScreen" class="w-full max-w-md p-8 bg-gray-900 rounded-3xl shadow-2xl border border-gray-800">
        <div class="flex items-center justify-between mb-8">
            <h1 class="text-xl font-black text-white tracking-tighter uppercase">Discord Looper</h1>
            <span class="text-[10px] bg-indigo-600 text-white px-2 py-1 rounded-full">READY</span>
        </div>

        <div class="space-y-6">
            <div>
                <label class="text-[10px] text-gray-500 font-bold uppercase ml-1">Webhook URL</label>
                <input type="text" id="webhookUrl" placeholder="https://discord.com/..." 
                    class="w-full bg-gray-800 border border-gray-700 rounded-xl p-4 text-sm text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
            </div>

            <div>
                <label class="text-[10px] text-gray-500 font-bold uppercase ml-1">Interval</label>
                <input type="number" id="interval" value="3" min="1"
                    class="w-full bg-gray-800 border border-gray-700 rounded-xl p-4 text-sm text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
            </div>

            <button id="preStartBtn" class="w-full bg-white hover:bg-gray-200 text-black font-black py-4 rounded-xl shadow-xl transition-all uppercase tracking-widest">
                Start
            </button>

            <div id="statusArea" class="hidden border-t border-gray-800 pt-6 mt-6">
                <div class="flex justify-between items-center text-xs font-mono">
                    <span class="text-gray-500 uppercase">Status:</span>
                    <span class="text-red-500 font-bold animate-pulse">RUNNING</span>
                </div>
                <div class="flex justify-between items-center text-xs font-mono mt-2">
                    <span class="text-gray-500 uppercase">Total spam</span>
                    <span id="counter" class="text-white">0</span>
                </div>
            </div>
        </div>
    </div>

    <div id="authOverlay" class="hidden fixed inset-0 bg-gray-950/95 flex items-center justify-center z-50 p-6">
        <div class="bg-gray-900 p-8 rounded-3xl shadow-2xl border border-gray-700 w-full max-w-sm fade-in text-center">
            <h2 class="text-white font-bold mb-2">Security Authentication</h2>
            <p class="text-gray-500 text-xs mb-6 uppercase tracking-widest">Enter Access Key to Execute</p>
            
            <input type="password" id="accessKey" placeholder="Paste Key Here..." 
                class="w-full bg-black border border-gray-700 rounded-xl p-4 text-white text-center focus:outline-none focus:ring-2 focus:ring-red-600 mb-4 transition-all">
            
            <p id="authError" class="text-red-500 text-[10px] mb-4 hidden font-bold">認証 KEY</p>
            
            <div class="flex gap-2">
                <button id="cancelBtn" class="flex-1 bg-gray-800 text-gray-400 py-3 rounded-xl font-bold hover:bg-gray-700 transition-all">Cancel</button>
                <button id="confirmBtn" class="flex-1 bg-red-600 text-white py-3 rounded-xl font-bold hover:bg-red-500 transition-all shadow-lg shadow-red-900/20">Confirm</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
