<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord 鯖破壊ツール</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-slate-300 min-h-screen flex items-center justify-center p-4">

    <div id="toolScreen" class="w-full max-w-md p-8 bg-gray-900 rounded-3xl shadow-2xl border border-gray-800">
        <div class="flex items-center justify-between mb-8">
            <h1 class="text-xl font-black text-white tracking-tighter uppercase">Discord 破壊</h1>
            <span class="text-[10px] bg-indigo-600 text-white px-2 py-1 rounded-full">準備完了</span>
        </div>

        <div class="space-y-6">
            <div>
                <label class="text-[10px] text-gray-500 font-bold uppercase ml-1">Webhook URL</label>
                <input type="text" id="webhookUrl" placeholder="https://discord.com/api/webhooks/..." 
                    class="w-full bg-gray-800 border border-gray-700 rounded-xl p-4 text-sm text-white focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>

            <div>
                <label class="text-[10px] text-gray-500 font-bold uppercase ml-1">送信間隔 (秒)</label>
                <input type="number" id="interval" value="3" min="1"
                    class="w-full bg-gray-800 border border-gray-700 rounded-xl p-4 text-sm text-white focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>

            <button type="button" id="preStartBtn" onclick="openAuth()"
                class="w-full bg-white hover:bg-gray-200 text-black font-black py-4 rounded-xl shadow-xl transition-all uppercase tracking-widest">
                送信を開始する
            </button>

            <div id="statusArea" class="hidden border-t border-gray-800 pt-6 mt-6">
                <div class="flex justify-between items-center text-xs font-mono">
                    <span class="text-gray-500">ステータス:</span>
                    <span class="text-red-500 font-bold animate-pulse">実行中</span>
                </div>
                <div class="flex justify-between items-center text-xs font-mono mt-2">
                    <span class="text-gray-500">送信回数:</span>
                    <span id="counter" class="text-white">0</span>
                </div>
            </div>
        </div>
    </div>

    <div id="authOverlay" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50 p-6">
        <div class="bg-gray-900 p-8 rounded-3xl border border-gray-700 w-full max-w-sm text-center shadow-2xl">
            <h2 class="text-white font-bold mb-2 uppercase text-sm tracking-widest">認証</h2>
            <p class="text-gray-500 text-[10px] mb-6">実行するにはアクセスキーを入力してください</p>
            
            <input type="password" id="accessKey" placeholder="キーをここにペースト" 
                class="w-full bg-black border border-gray-700 rounded-xl p-4 text-white text-center focus:outline-none focus:ring-2 focus:ring-red-600 mb-6 transition-all">
            
            <div class="flex gap-2">
                <button onclick="closeAuth()" class="flex-1 bg-gray-800 text-gray-400 py-3 rounded-xl font-bold hover:bg-gray-700 transition-all">キャンセル</button>
                <button onclick="checkAndStart()" class="flex-1 bg-red-600 text-white py-3 rounded-xl font-bold hover:bg-red-500 transition-all shadow-lg">認証して実行</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
